name: Build and Push to DockerHub

# האוטומציה תופעל בכל פעם שיש Push לענף הראשי (main)
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. משיכת הקוד מהריפו (Checkout)
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. התחברות ל-DockerHub באמצעות הסודות שהגדרנו
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. בניית האימג' ודחיפתו לחשבון ה-DockerHub שלך
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/final-python-app:latest